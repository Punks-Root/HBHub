<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HB Key Access</title>
  <style>
    :root {
      --bg: #060816;
      --panel: rgba(16, 22, 38, 0.95);
      --line: #2b3b5e;
      --accent: #63b3ff;
      --accent-2: #ffe180;
      --text: #f4f7ff;
      --muted: #9aa8c7;
      --ok: #6dff9e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f1a33 0%, var(--bg) 55%, #03050b 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--accent-2);
      background: rgba(255, 225, 128, 0.14);
      margin-bottom: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 2vw, 2rem);
    }

    p { color: var(--muted); line-height: 1.6; }

    .key-box {
      margin: 18px 0 12px;
      padding: 16px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed var(--line);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(90deg, var(--accent), #2b7ce8);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--ok);
      min-height: 1.2em;
    }

    .footer {
      margin-top: 18px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card { padding: 22px; }
      .actions { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Hosteable gratis</div>
    <h1>Obtener tu key de HB</h1>
    <!-- Formulario mínimo para recoger email y lanzar checkout. Comentarios para desarrolladores. -->
    <div class="key-box" id="keyBox">Compra una key</div>

    <div class="actions">
      <input id="emailInput" type="email" placeholder="tu@correo.com" style="padding:10px;border-radius:12px;border:1px solid var(--line);flex:1;min-width:160px" />
      <button class="primary" id="buyBtn">Comprar key — €7</button>
    </div>

    <div class="status" id="status"></div>

    <div class="footer">
      <!-- Footer visible minimal. -->
      <strong>Pago seguro</strong>
    </div>
  </div>

  <script>
    // Código cliente: lanza checkout en el servidor y redirige al usuario.
    const keyBox = document.getElementById("keyBox");
    const status = document.getElementById("status");
    const emailInput = document.getElementById("emailInput");
    const buyBtn = document.getElementById("buyBtn");

    buyBtn.addEventListener("click", async () => {
      const email = (emailInput.value || "").trim();
      if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        status.textContent = "Introduce un correo válido.";
        return;
      }
      status.textContent = "Creando sesión de pago...";
      try {
        const res = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.url) {
          // Redirige a Stripe Checkout
          window.location = data.url;
        } else {
          status.textContent = data.error || 'Error al crear checkout.';
        }
      } catch (err) {
        status.textContent = 'Error de red. Intenta de nuevo.';
      }
    });
  </script>
</body>
</html>
